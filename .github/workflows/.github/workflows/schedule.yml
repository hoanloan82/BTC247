name: Robot Văn Bản Đến - Sở KH&CN

on:
  schedule:
    # Chạy 2 tiếng/lần, từ 7h-17h (giờ VN = UTC+7, nên trừ 7)
    # 0h, 2h, 4h, 6h, 8h, 10h UTC = 7h, 9h, 11h, 13h, 15h, 17h VN
    - cron: '0 0,2,4,6,8,10 * * 1-5'  # Thứ 2 đến thứ 6

  # Cho phép chạy thủ công khi cần
  workflow_dispatch:

jobs:
  quet-van-ban:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Tải code về
        uses: actions/checkout@v4

      - name: 🐍 Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cài thư viện
        run: |
          pip install selenium webdriver-manager requests

      - name: 🌐 Cài Chrome
        uses: browser-actions/setup-chrome@v1

      - name: 📂 Khôi phục danh sách đã gửi
        uses: actions/cache@v4
        with:
          path: da_gui.json
          key: da-gui-cache-${{ github.run_id }}
          restore-keys: |
            da-gui-cache-

      - name: 🤖 Chạy Robot
        env:
          SKHCN_USER: ${{ secrets.SKHCN_USER }}
          SKHCN_PASS: ${{ secrets.SKHCN_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python robot.py

      - name: 💾 Lưu danh sách đã gửi
        uses: actions/cache/save@v4
        if: always()
        with:
          path: da_gui.json
          key: da-gui-cache-${{ github.run_id }}
