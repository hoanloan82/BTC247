name: Quân Sư Crypto Tự Động

on:
  schedule:
    - cron: '0 * * * *' # Cứ mỗi 1 tiếng Robot sẽ thức dậy lấy số liệu và gửi phân tích một lần
  workflow_dispatch: # Nút bấm chạy bằng tay ngay lập tức

jobs:
  run-crypto:
    runs-on: ubuntu-latest

    steps:
    - name: Tải code về
      uses: actions/checkout@v4

    - name: Cài đặt Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Cài đặt thư viện
      run: |
        python -m pip install --upgrade pip
        pip install requests google-genai

    - name: Chạy Quân Sư AI
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python crypto_bot.py
