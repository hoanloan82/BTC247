⏱️ Timeout ngắt tự động (Timeout minutes):

Ép hệ thống GitHub rút phích cắm điện của Robot sau đúng 5 phút nếu xảy ra lỗi đơ Selenium hoặc nghẽn mạng.

🛌 Lịch làm việc thông minh (Cron Giờ hành chính):

Chỉ cho Robot làm việc từ thứ Hai đến thứ Sáu (trong khung giờ hành chính 7h30 - 17h00). Đêm đến và cuối tuần cho Robot đi ngủ lấy sức.

🚦 Cơ chế chống trùng lặp dữ liệu (Duplicate Check):

Chỉ bắn tin nhắn Telegram khi xuất hiện văn bản thực sự mới tinh, không quét đi quét lại rác dữ liệu cũ.
