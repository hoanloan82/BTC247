name: Crypto Bot Pro

on:
  schedule:
    - cron: '*/30 * * * *' # Chạy mỗi 30 phút (Hợp lý vì bản này dùng Vision tốn quota hơn)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Tải code về
      uses: actions/checkout@v4

    - name: 🐍 Cài đặt Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Cài đặt thư viện đồ họa và chỉ báo
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas mplfinance matplotlib ta google-genai

    - name: 🚀 Chạy Robot Pro
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python robot.py # Anh nhớ kiểm tra tên file python trên GitHub là robot.py nhé
