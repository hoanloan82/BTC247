name: Crypto Bot

on:
  schedule:
    - cron: '*/30 * * * *' # Chạy mỗi 30 phút một lần
  workflow_dispatch: # Cho phép bấm nút chạy tay

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Tải code về
      uses: actions/checkout@v4

    - name: 🐍 Cài đặt Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 👈 Nâng lên 3.11 để hỗ trợ pandas-ta tốt hơn

    - name: 📦 Cài đặt thư viện
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas==2.1.4 mplfinance google-genai ccxt
        pip install pandas-ta==0.3.14b0 # 👈 Ép cài phiên bản này để không bị lỗi máy ảo
        
    - name: 🚀 Chạy Robot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python robot.py
