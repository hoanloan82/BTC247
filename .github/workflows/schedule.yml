name: Crypto Bot Anh Hoan - Đa Khung Giờ

on:
  schedule:
    - cron: '*/30 * * * *' # ⏳ Cứ mỗi 30 phút chạy 1 lần để tránh lỗi 429 API miễn phí
  workflow_dispatch: # 🛠️ Cho phép anh bấm nút "Run workflow" bằng tay trên web GitHub bất cứ lúc nào

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Bước 1: Tải Code từ Repository về máy ảo GitHub
      uses: actions/checkout@v4

    - name: 🐍 Bước 2: Cài đặt Python môi trường ảo
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Bước 3: Cài đặt các thư viện hỗ trợ (ccxt, pandas, mplfinance, google-genai)
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas pandas-ta mplfinance google-genai ccxt

    - name: 🚀 Bước 4: Chạy Robot Crypto Đa Khung Giờ
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python crypto_bot.py # 👈 Đảm bảo tên file python của anh trùng khớp ở đây
