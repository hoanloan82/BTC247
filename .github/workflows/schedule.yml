name: Crypto Bot

on:
  schedule:
    - cron: '*/30 * * * *' # Chạy 30 phút một lần
  workflow_dispatch: # Nút chạy tay trên web

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Tải code về
      uses: actions/checkout@v4

    - name: 🐍 Cài đặt Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Cài đặt thư viện
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas mplfinance google-genai ccxt

    - name: 🚀 Chạy Robot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python robot.py
